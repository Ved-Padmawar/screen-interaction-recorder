<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
  <title>Tooltip Editor - Screen Interaction Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      background-color: #1a1a1a;
      color: white;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    
    .editor-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }
    
    .editor-header {
      background-color: #2a2a2a;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      flex-shrink: 0;
      z-index: 100;
    }
    
    .editor-header .title {
      font-size: 1.2em;
      margin: 0;
      color: white;
    }
    
    .header-controls {
      display: flex;
      gap: 12px;
    }
    
    .control-button {
      padding: 8px 12px;
      font-size: 13px;
      border: none;
      border-radius: 4px;
      background-color: #3a3a3a;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .control-button:hover {
      background-color: #505050;
    }
    
    .control-button.primary {
      background-color: #4285f4;
    }
    
    .control-button.primary:hover {
      background-color: #3367d6;
    }
    
    .control-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .editor-main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    .slide-viewer {
      flex: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #1e1e1e;
      padding: 20px;
      position: relative;
    }
    
    .slide-display {
      position: relative;
      max-width: 85%;
      max-height: 75%;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
    }
    
    .slide-image {
      width: 100%;
      height: auto;
      max-width: 100%;
      max-height: calc(100vh - 200px);
      object-fit: contain;
      display: block;
      border: 1px solid #444;
    }
    
    .slide-counter {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .editor-panel {
      flex: 1;
      background-color: #2a2a2a;
      padding: 24px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #444;
      min-width: 320px;
      max-width: 400px;
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.2);
    }
    
    .panel-title {
      margin: 0 0 20px 0;
      font-size: 1.2em;
      color: #fff;
      font-weight: 500;
      padding-bottom: 12px;
      border-bottom: 1px solid #444;
    }
    
    .tooltip-input {
      width: 100%;
      height: 150px;
      padding: 16px;
      border-radius: 8px;
      border: 2px solid #444;
      background-color: #1a1a1a;
      color: #fff;
      font-size: 15px;
      line-height: 1.5;
      font-family: 'Roboto', sans-serif;
      resize: vertical;
      margin-bottom: 24px;
      transition: border-color 0.2s ease;
    }
    
    .tooltip-input:focus {
      outline: none;
      border-color: #4285f4;
      box-shadow: 0 0 0 1px #4285f4;
    }
    
    .navigation-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      background-color: #1a1a1a;
      padding: 12px;
      border-radius: 8px;
      gap: 8px;
    }
    
    .nav-button {
      padding: 10px 16px;
      background-color: #3a3a3a;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      white-space: nowrap;
      user-select: none;
    }

    .nav-button span {
      display: inline-block;
      vertical-align: middle;
    }
    
    .nav-button:hover:not(:disabled) {
      background-color: #4285f4;
      transform: translateY(-1px);
    }
    
    .nav-button:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .nav-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background-color: #333;
    }
    
    .slide-info {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 12px;
      background-color: #333;
      border-radius: 4px;
      flex-shrink: 0;
      min-width: 80px;
    }
    
    .status-message {
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    
    .status-message.success {
      background-color: #4CAF50;
      color: white;
    }
    
    .status-message.error {
      background-color: #f44336;
      color: white;
    }
    
    .status-message.info {
      background-color: #2196F3;
      color: white;
    }
    
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-size: 18px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="editor-header">
      <h1 id="editor-title" class="title">Tooltip Editor</h1>
      <div class="header-controls">
        <button id="save-all-tooltips" class="control-button primary">Save All Changes</button>
        <button id="back-to-recordings-editor" class="control-button">Back to Recordings</button>
      </div>
    </div>

    <div id="loading-state-editor" class="loading-state">Loading recording...</div>

    <div class="editor-main" style="display: none;">
      <div class="slide-viewer">
        <div class="slide-display">
          <img id="slide-image-editor" class="slide-image" src="" alt="Slide Image">
        </div>
        <div id="slide-counter-display" class="slide-counter">Slide 1/1</div>
      </div>
      
      <div class="editor-panel">
        <h3 class="panel-title">Edit Tooltip for Slide <span id="current-slide-number-editor">1</span>/<span id="total-slides-editor">1</span></h3>
        
        <textarea id="tooltip-input-editor" class="tooltip-input" placeholder="Enter tooltip text for this interaction..."></textarea>
        
        <div class="navigation-controls">
          <button id="prev-slide-editor" class="nav-button"><span>← Previous</span></button>
          <div id="slide-info" class="slide-info">Slide 1/1</div>
          <button id="next-slide-editor" class="nav-button"><span>Next →</span></button>
        </div>
        
        <div id="status-message-editor" class="status-message"></div>
      </div>
    </div>
  </div>

  <script src="js/tooltip-editor.js"></script>
</body>
</html>
