<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
  <title>Export PowerPoint — Screen Interaction Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="generator-body">
  <div class="generator-card">

    <div class="header">
      <h1 id="generator-title" class="title">Export PowerPoint</h1>
      <p id="recording-subtitle" class="subtitle"></p>
    </div>

    <p id="status-text" class="status-text">Preparing your slides…</p>

    <div id="error-container" class="error-container" style="display:none;"></div>

    <div class="progress-container">
      <div id="progress-bar" class="progress-bar" style="width:5%;"></div>
    </div>

    <div id="complete-badge" class="complete-badge" style="display:none;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
      Downloaded successfully
    </div>

    <div class="button-container">
      <button id="generate-btn" class="button primary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Generate PowerPoint
      </button>
      <button id="view-slideshow-btn" class="button secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        View Slideshow
      </button>
      <button id="back-to-recordings-btn" class="button secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        Back to Recordings
      </button>
    </div>

  </div>

  <script src="js/lib/pptxgen.bundle.js"></script>
  <script src="js/pptx-generator.js"></script>
</body>
</html>
