<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self';">
  <title>Screen Interaction Recorder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="popup-body">
  <div class="popup-container">

    <div class="popup-brand">
      <div class="popup-brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
      </div>
      <div>
        <div class="popup-brand-name">Screen Recorder</div>
        <div class="popup-brand-version">v2.0</div>
      </div>
    </div>

    <div class="popup-divider"></div>

    <div id="recording-indicator" class="recording-indicator" style="display:none;">
      <div class="recording-icon"></div>
      Recording in progress
      <span class="recording-indicator-steps" id="step-count"></span>
    </div>

    <div class="form">
      <div>
        <div class="popup-field-label">Recording Title</div>
        <input
          type="text"
          id="recording-title"
          class="input"
          placeholder="e.g. Onboarding flow"
        >
      </div>

      <button id="recording-button" class="button primary" style="width:100%;padding:10px;">
        Start Recording
      </button>
    </div>

    <button id="view-recordings" class="view-recordings-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      View Saved Recordings
    </button>

    <div class="footer">Press <kbd>Shift+C</kbd> on any page to capture a step</div>

  </div>

  <script src="js/popup.js"></script>
</body>
</html>
